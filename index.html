<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ირინა & გიორგი | ქორწილი</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Playfair Display',serif;}

body{
  background:#f7f2ea;
  overflow-x:hidden;
  color:#3a3a3a;
}

/* ✨ STRONG SPARKLE BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6), transparent 3%),
    radial-gradient(circle at 70% 20%, rgba(255,255,255,0.5), transparent 2%),
    radial-gradient(circle at 40% 70%, rgba(255,255,255,0.4), transparent 3%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.5), transparent 2%);
  animation:sparkleMove 6s infinite linear;
  pointer-events:none;
  z-index:0;
}

@keyframes sparkleMove{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#fff,#f3eadf);
}

/* ✨ SHIMMER NAME */
.hero h1{
  font-family:'Great Vibes',cursive;
  font-size:74px;
  position:relative;
  z-index:3;
  background:linear-gradient(90deg,#b08d57,#fff,#b08d57);
  background-size:200% auto;
  -webkit-background-clip:text;
  color:transparent;
  animation:shine 3s linear infinite;
}

@keyframes shine{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}

.hero p{
  margin-top:10px;
  font-size:18px;
  opacity:.85;
  animation:shineText 4s infinite;
}

/* shimmer text */
@keyframes shineText{
  0%,100%{text-shadow:0 0 5px rgba(255,255,255,0.3);}
  50%{text-shadow:0 0 15px rgba(255,255,255,0.7);}
}

/* ❤️ HEARTS (STOP AT NAME AREA) */
.heart{
  position:absolute;
  color:#ff2d55;
  font-size:18px;
  opacity:0.7;
  animation:rise 6s linear forwards;
  z-index:2;
}

@keyframes rise{
  0%{transform:translateY(100vh) scale(0.6);}
  100%{transform:translateY(35vh) scale(1.2);} /* stops near name */
}

/* SECTIONS */
section{
  padding:80px 20px;
  text-align:center;
  position:relative;
  z-index:2;
}

h2{
  font-size:28px;
  margin-bottom:20px;
  color:#b08d57;
  animation:shineText 3s infinite;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:420px;
  margin:20px auto;
  border:1px solid rgba(0,0,0,0.05);
}

/* BUTTON */
button{
  background:#b08d57;
  color:#fff;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MUSIC */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#b08d57;
  padding:12px;
  border-radius:50%;
  color:#fff;
  border:none;
  z-index:10;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>ირინა & გიორგი</h1>
  <p>გიწვევთ ქორწილში</p>
  <p>13 სექტემბერი, 2026 • ზუგდიდი, ბაგრატიონი</p>
</div>

<!-- ❤️ HEARTS -->
<script>
for(let i=0;i<30;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(4+Math.random()*3)+"s";
  h.style.fontSize=(12+Math.random()*18)+"px";
  document.body.appendChild(h);
}
</script>

<!-- DETAILS -->
<section>
  <h2>დეტალები</h2>
  <div class="card">
    <p>გელოდებით ამ განსაკუთრებულ დღეს თქვენთან ერთად 💍</p>
  </div>
</section>

<!-- STORY -->
<section>
  <h2>ჩვენი ისტორია</h2>
  <div class="card">
    <p>ერთი შეხვედრიდან — სამუდამო სიყვარულამდე ❤️</p>
  </div>
</section>

<!-- RSVP -->
<section>
  <h2>დადასტურება (RSVP)</h2>
  <div class="card">
    <input placeholder="თქვენი სახელი"/>
    <button onclick="alert('მადლობა! 💛')">დადასტურება</button>
  </div>
</section>

<!-- MUSIC -->
<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/30/audio_5c7c3c7c8b.mp3" type="audio/mpeg">
</audio>

<script>
let playing=false;
function toggleMusic(){
  let audio=document.getElementById("audio");
  if(!playing){audio.play();playing=true;}
  else{audio.pause();playing=false;}
}
</script>

</body>
</html>
